<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossword: Unit 6 Patterns</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f3; --surface: #fff; --surface2: #f0ede6;
  --dark: #2c2416; --mid: #7a6e5e; --border: #ddd8cc;
  --coral: #9b72cf; --blue: #d7ecf0; --yellow: #f3d25b; --green: #52b788;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

header {
  background: var(--dark); padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-weight: 700; font-size: 1.3rem; color: var(--bg); }
.hdr-badge { background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 14px; font-size: 0.78rem; color: rgba(255,255,255,0.7); font-weight: 600; }

.page { max-width: 1000px; margin: 0 auto; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 16px; }
.subtitle-bar { text-align: center; font-size: 0.82rem; font-weight: 600; color: var(--mid); letter-spacing: 0.06em; text-transform: uppercase; }

.game-layout { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }

/* GRID */
.cw-grid-wrap { background: var(--surface); border-radius: 18px; padding: 16px; border: 2px solid var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: auto; }
.cw-grid { display: inline-grid; gap: 2px; }
.cw-cell {
  width: 34px; height: 34px; position: relative;
  background: var(--dark);
  border-radius: 2px;
}
.cw-cell.open { background: var(--surface); border: 1.5px solid var(--border); }
.cw-cell.correct { background: #e8f8ef; border-color: var(--green); }
.cw-cell.active { background: #fff8e8; border-color: var(--yellow); }
.cw-cell.highlight { background: #f0f8ff; border-color: #90c0d4; }
.cw-num {
  position: absolute; top: 2px; left: 3px;
  font-size: 0.5rem; font-weight: 700; color: var(--mid); line-height: 1;
  pointer-events: none;
}
.cw-input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border: none; background: transparent; outline: none;
  text-align: center; font-family: 'Poppins', sans-serif;
  font-size: 0.95rem; font-weight: 700; color: var(--dark);
  text-transform: uppercase; cursor: pointer; caret-color: transparent;
  padding: 0;
}
.cw-input.grapheme-letter { color: var(--coral); font-weight: 800; }

/* CLUES */
.clues-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 16px; }
.clue-section h3 { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 10px; border-bottom: 2px solid var(--border); padding-bottom: 6px; }
.clue-list { display: flex; flex-direction: column; gap: 4px; }
.clue-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 7px 10px; border-radius: 8px; cursor: pointer;
  transition: background 0.13s; font-size: 0.82rem; line-height: 1.5;
}
.clue-item:hover { background: var(--surface2); }
.clue-item.active { background: #fff8e8; border-left: 3px solid var(--yellow); }
.clue-item.solved { color: var(--mid); text-decoration: line-through; }
.clue-num { font-weight: 800; color: var(--coral); flex-shrink: 0; min-width: 24px; }
.clue-text { flex: 1; }

/* PROGRESS */
.progress-bar-wrap { background: var(--surface2); border-radius: 20px; height: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 20px; background: var(--green); transition: width 0.4s ease; }
.progress-label { font-size: 0.75rem; color: var(--mid); font-weight: 600; margin-top: 4px; }

/* BUTTONS */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 0.82rem;
  padding: 9px 18px; border-radius: 10px; border: 2px solid var(--border);
  background: var(--surface2); color: var(--mid); cursor: pointer; transition: all 0.13s;
}
.btn:hover { border-color: var(--dark); color: var(--dark); }
.btn-check { background: var(--coral); color: white; border-color: var(--coral); }
.btn-check:hover { background: #c0392b; border-color: #c0392b; color: white; }

/* WIN */
#cw-win { display: none; position: fixed; inset: 0; background: rgba(44,36,22,0.82); backdrop-filter: blur(3px); z-index: 50; align-items: center; justify-content: center; }
#cw-win.show { display: flex; }
.win-card { background: var(--surface); border-radius: 24px; padding: 44px 52px; text-align: center; max-width: 380px; width: 90%; border: 3px solid var(--yellow); }
.win-card h2 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
.win-card p { color: var(--mid); margin-bottom: 24px; font-size: 0.95rem; }
.win-btn { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1rem; padding: 12px 32px; border-radius: 12px; border: none; background: var(--dark); color: var(--bg); cursor: pointer; }

/* NOTE */
.note-bar { background: var(--blue); border-radius: 12px; padding: 10px 16px; font-size: 0.8rem; color: #2a5a68; font-weight: 600; }

@media (max-width: 600px) {
  .cw-cell { width: 28px; height: 28px; }
  .cw-input { font-size: 0.8rem; }
  .cw-num { font-size: 0.45rem; }
}
</style>
</head>
<body>

<header>
  <h1>Crossword: Unit 6 Patterns</h1>
  <div class="hdr-badge">Unit 6 · Silent Letters</div>
</header>

<div class="page">
  <div class="subtitle-bar">SUBCrossword: Unit 6 Patterns</div>

  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <div style="flex:1;min-width:160px;">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label"><span id="solved-count">0</span> / <span id="total-words">0</span> words solved</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-check" onclick="checkAll()">&#10003; Check All</button>
      <button class="btn" onclick="revealAll()">&#128065; Reveal All</button>
      <button class="btn" onclick="resetPuzzle()">&#8635; Reset</button>
    </div>
  </div>

  <div class="note-bar">Type each answer into the grid. The target grapheme in each word is shown in coral as you type.</div>

  <div class="game-layout">
    <div class="cw-grid-wrap">
      <div class="cw-grid" id="cw-grid" style="grid-template-columns: repeat(11px, 36px);"></div>
    </div>
    <div class="clues-panel">
      <div class="clue-section">
        <h3>Across</h3>
        <div class="clue-list" id="clues-across"></div>
      </div>
      <div class="clue-section">
        <h3>Down</h3>
        <div class="clue-list" id="clues-down"></div>
      </div>
    </div>
  </div>
</div>

<div id="cw-win">
  <div class="win-card">
    <h2>&#127881; Solved!</h2>
    <p>Every word filled in correctly!</p>
    <button class="win-btn" onclick="resetPuzzle()">Play Again</button>
  </div>
</div>

<script>
const PUZZLE_DATA = {"grid": [[".", ".", ".", ".", ".", ".", ".", "N", ".", ".", "."], [".", ".", ".", ".", ".", "C", "L", "I", "M", "B", "."], [".", ".", ".", ".", ".", ".", ".", "G", ".", ".", "."], [".", ".", ".", ".", ".", ".", ".", "H", ".", ".", "."], [".", ".", ".", ".", ".", ".", ".", "T", ".", ".", "."], [".", ".", ".", "P", ".", ".", ".", ".", ".", ".", "."], [".", ".", "T", "H", "U", "M", "B", ".", ".", ".", "."], [".", ".", ".", "O", ".", "D", "W", ".", "B", ".", "."], [".", ".", ".", "N", ".", "O", "R", "G", "R", ".", "."], [".", "K", "N", "E", "E", "L", "I", "R", "I", ".", "."], [".", ".", ".", ".", ".", "P", "S", "A", "G", ".", "."], [".", "F", "L", "I", "G", "H", "T", "P", "H", ".", "."], [".", ".", ".", "K", "N", "I", "G", "H", "T", ".", "."], [".", ".", "W", "R", "O", "N", "G", ".", ".", ".", "."], [".", ".", ".", ".", ".", ".", ".", ".", ".", ".", "."]], "placed": [{"word": "KNEEL", "grapheme": "kn", "clue": "To go down on your knees (silent k)", "r": 9, "c": 1, "dr": 0, "dc": 1, "num": 9}, {"word": "DOLPHIN", "grapheme": "ph", "clue": "A smart sea mammal that clicks and leaps", "r": 7, "c": 5, "dr": 1, "dc": 0, "num": 5}, {"word": "FLIGHT", "grapheme": "igh", "clue": "A trip on an airplane", "r": 11, "c": 1, "dr": 0, "dc": 1, "num": 10}, {"word": "WRIST", "grapheme": "wr", "clue": "The joint between your hand and arm (silent w)", "r": 7, "c": 6, "dr": 1, "dc": 0, "num": 6}, {"word": "WRONG", "grapheme": "wr", "clue": "Not right (silent w)", "r": 13, "c": 2, "dr": 0, "dc": 1, "num": 12}, {"word": "KNIGHT", "grapheme": "kn", "clue": "A medieval warrior in armour (silent k)", "r": 12, "c": 3, "dr": 0, "dc": 1, "num": 11}, {"word": "CLIMB", "grapheme": "mb", "clue": "To go up — ___ a tree (silent b)", "r": 1, "c": 5, "dr": 0, "dc": 1, "num": 2}, {"word": "PHONE", "grapheme": "ph", "clue": "You call people on this (ph says /f/)", "r": 5, "c": 3, "dr": 1, "dc": 0, "num": 3}, {"word": "GRAPH", "grapheme": "ph", "clue": "A chart showing data — bar ___ or line ___", "r": 8, "c": 7, "dr": 1, "dc": 0, "num": 8}, {"word": "NIGHT", "grapheme": "igh", "clue": "The opposite of day (igh word)", "r": 0, "c": 7, "dr": 1, "dc": 0, "num": 1}, {"word": "BRIGHT", "grapheme": "igh", "clue": "Very shiny or smart", "r": 7, "c": 8, "dr": 1, "dc": 0, "num": 7}, {"word": "THUMB", "grapheme": "mb", "clue": "The short, thick finger on your hand (silent b)", "r": 6, "c": 2, "dr": 0, "dc": 1, "num": 4}], "rows": 15, "cols": 11, "numbered": {"0,7": 1, "1,5": 2, "5,3": 3, "6,2": 4, "7,5": 5, "7,6": 6, "7,8": 7, "8,7": 8, "9,1": 9, "11,1": 10, "12,3": 11, "13,2": 12}};

let activeWord = null;
let activeDir = null;

function init() {
  const {grid, placed, rows, cols, numbered} = PUZZLE_DATA;
  document.getElementById('total-words').textContent = placed.length;

  // Build grid DOM
  const container = document.getElementById('cw-grid');
  container.innerHTML = '';
  container.style.gridTemplateColumns = `repeat(${cols}, 36px)`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cw-cell';
      cell.dataset.r = r; cell.dataset.c = c;

      const ch = grid[r][c];
      if (ch !== '.') {
        cell.classList.add('open');
        cell.dataset.answer = ch;

        // Number label
        const num = numbered[`${r},${c}`];
        if (num) {
          const numEl = document.createElement('div');
          numEl.className = 'cw-num';
          numEl.textContent = num;
          cell.appendChild(numEl);
        }

        const input = document.createElement('input');
        input.className = 'cw-input';
        input.maxLength = 1;
        input.dataset.r = r; input.dataset.c = c;
        input.autocomplete = 'off'; input.autocorrect = 'off';
        input.autocapitalize = 'characters'; input.spellcheck = false;
        input.addEventListener('focus', () => onFocus(r, c));
        input.addEventListener('input', e => onInput(e, r, c));
        input.addEventListener('keydown', e => onKeyDown(e, r, c));
        cell.appendChild(input);
      }
      container.appendChild(cell);
    }
  }

  renderClues();
  updateProgress();
}

function cellEl(r, c) { return document.querySelector(`.cw-cell[data-r="${r}"][data-c="${c}"]`); }
function inputEl(r, c) { return document.querySelector(`.cw-input[data-r="${r}"][data-c="${c}"]`); }

function onFocus(r, c) {
  // Find which words cover this cell; toggle direction on repeated click
  const words = PUZZLE_DATA.placed.filter(p => cellInWord(p, r, c));
  if (!words.length) return;

  let chosen = words[0];
  if (activeWord && words.length > 1) {
    const current = words.find(w => w === activeWord);
    if (current) {
      // toggle to the other
      chosen = words.find(w => w !== activeWord) || words[0];
    }
  }
  setActive(chosen);
}

function cellInWord(p, r, c) {
  for (let i = 0; i < p.word.length; i++) {
    if (p.r + p.dr*i === r && p.c + p.dc*i === c) return true;
  }
  return false;
}

function setActive(wordEntry) {
  // Clear highlights
  document.querySelectorAll('.cw-cell.active, .cw-cell.highlight').forEach(el => {
    el.classList.remove('active', 'highlight');
  });
  document.querySelectorAll('.clue-item.active').forEach(el => el.classList.remove('active'));

  activeWord = wordEntry;

  // Highlight word cells
  for (let i = 0; i < wordEntry.word.length; i++) {
    const el = cellEl(wordEntry.r + wordEntry.dr*i, wordEntry.c + wordEntry.dc*i);
    if (el) el.classList.add(i === 0 ? 'active' : 'highlight');
  }

  // Highlight clue
  const dir = wordEntry.dr === 0 ? 'across' : 'down';
  const clueEl = document.querySelector(`.clue-item[data-num="${wordEntry.num}"][data-dir="${dir}"]`);
  if (clueEl) { clueEl.classList.add('active'); clueEl.scrollIntoView({block:'nearest'}); }
}

function onInput(e, r, c) {
  const inp = e.target;
  const val = inp.value.toUpperCase().replace(/[^A-Z]/g, '');
  inp.value = val ? val[val.length-1] : '';
  colorizeGraphemes();
  if (inp.value) advanceCursor(r, c);
  checkWordComplete();
  updateProgress();
}

function advanceCursor(r, c) {
  if (!activeWord) return;
  const {dr, dc, word} = activeWord;
  for (let i = 0; i < word.length - 1; i++) {
    if (activeWord.r + dr*i === r && activeWord.c + dc*i === c) {
      const inp = inputEl(activeWord.r + dr*(i+1), activeWord.c + dc*(i+1));
      if (inp) inp.focus();
      return;
    }
  }
}

function onKeyDown(e, r, c) {
  if (e.key === 'Backspace') {
    const inp = inputEl(r, c);
    if (inp && inp.value === '' && activeWord) {
      const {dr, dc, word} = activeWord;
      for (let i = 1; i < word.length; i++) {
        if (activeWord.r + dr*i === r && activeWord.c + dc*i === c) {
          const prev = inputEl(activeWord.r + dr*(i-1), activeWord.c + dc*(i-1));
          if (prev) { prev.value = ''; prev.focus(); }
          return;
        }
      }
    }
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
  }
}

function clueClick(num, dir) {
  const p = PUZZLE_DATA.placed.find(w => {
    const wDir = w.dr === 0 ? 'across' : 'down';
    return w.num === num && wDir === dir;
  });
  if (p) {
    setActive(p);
    const inp = inputEl(p.r, p.c);
    if (inp) inp.focus();
  }
}

function renderClues() {
  const across = PUZZLE_DATA.placed.filter(p => p.dr === 0 && p.dc === 1).sort((a,b) => a.num - b.num);
  const down   = PUZZLE_DATA.placed.filter(p => p.dr === 1 && p.dc === 0).sort((a,b) => a.num - b.num);

  function renderList(list, containerId, dir) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    list.forEach(p => {
      const div = document.createElement('div');
      div.className = 'clue-item';
      div.dataset.num = p.num; div.dataset.dir = dir;
      div.onclick = () => clueClick(p.num, dir);
      div.innerHTML = `<span class="clue-num">${p.num}</span><span class="clue-text">${p.clue}</span>`;
      container.appendChild(div);
    });
  }
  renderList(across, 'clues-across', 'across');
  renderList(down,   'clues-down',   'down');
}

function colorizeGraphemes() {
  PUZZLE_DATA.placed.forEach(p => {
    const word = p.word;
    const g = p.grapheme.toUpperCase();
    const gIdx = word.toUpperCase().indexOf(g);
    for (let i = 0; i < word.length; i++) {
      const inp = inputEl(p.r + p.dr*i, p.c + p.dc*i);
      if (!inp) continue;
      if (i >= gIdx && i < gIdx + g.length) {
        inp.classList.add('grapheme-letter');
      } else {
        inp.classList.remove('grapheme-letter');
      }
    }
  });
}

function checkWordComplete() {
  PUZZLE_DATA.placed.forEach(p => {
    let allCorrect = true;
    for (let i = 0; i < p.word.length; i++) {
      const inp = inputEl(p.r + p.dr*i, p.c + p.dc*i);
      if (!inp || inp.value !== p.word[i]) { allCorrect = false; break; }
    }
    if (allCorrect) {
      for (let i = 0; i < p.word.length; i++) {
        const el = cellEl(p.r + p.dr*i, p.c + p.dc*i);
        if (el) el.classList.add('correct');
      }
      const dir = p.dr === 0 ? 'across' : 'down';
      const clueEl = document.querySelector(`.clue-item[data-num="${p.num}"][data-dir="${dir}"]`);
      if (clueEl) clueEl.classList.add('solved');
    }
  });
}

function updateProgress() {
  let solved = 0;
  PUZZLE_DATA.placed.forEach(p => {
    let ok = true;
    for (let i = 0; i < p.word.length; i++) {
      const inp = inputEl(p.r + p.dr*i, p.c + p.dc*i);
      if (!inp || inp.value !== p.word[i]) { ok = false; break; }
    }
    if (ok) solved++;
  });
  const total = PUZZLE_DATA.placed.length;
  document.getElementById('solved-count').textContent = solved;
  document.getElementById('progress-fill').style.width = (total ? Math.round(solved/total*100) : 0) + '%';
  if (solved === total && total > 0) setTimeout(() => document.getElementById('cw-win').classList.add('show'), 500);
}

function checkAll() {
  PUZZLE_DATA.placed.forEach(p => {
    for (let i = 0; i < p.word.length; i++) {
      const inp = inputEl(p.r + p.dr*i, p.c + p.dc*i);
      if (!inp) continue;
      if (inp.value && inp.value !== p.word[i]) {
        inp.style.color = 'var(--coral)';
        setTimeout(() => { inp.style.color = ''; }, 1200);
      }
    }
  });
  checkWordComplete();
  updateProgress();
}

function revealAll() {
  PUZZLE_DATA.placed.forEach(p => {
    for (let i = 0; i < p.word.length; i++) {
      const inp = inputEl(p.r + p.dr*i, p.c + p.dc*i);
      if (inp) inp.value = p.word[i];
    }
  });
  colorizeGraphemes();
  checkWordComplete();
  updateProgress();
}

function resetPuzzle() {
  document.querySelectorAll('.cw-input').forEach(inp => { inp.value = ''; inp.style.color = ''; });
  document.querySelectorAll('.cw-cell').forEach(el => el.classList.remove('correct','active','highlight'));
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active','solved'));
  document.getElementById('cw-win').classList.remove('show');
  activeWord = null;
  updateProgress();
}

init();
</script>
</body>
</html>
